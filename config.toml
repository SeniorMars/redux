base_url = "https://seniormars.github.io/redux/"
title = "SeniorMars"
description = "This is an example description"
build_search_index = true
feed_filenames = ["rss.xml"]
generate_feeds = true
compile_sass = true
minify_html = false
taxonomies = [
  { name = "tags" },
  { name = "authors" },
]

[search]
include_title = true
include_description = true
include_path = true
include_content = true
index_format = "elasticlunr_json"

[link_checker]
internal_level = "warn"
skip_anchor_prefixes = [
    "https://github.com/",
]

[markdown]
render_emoji = true
smart_punctuation = true
external_links_no_referrer = true
lazy_async_image = true
bottom_footnotes = true

[markdown.highlighting]
style = "class"
light_theme = "github-light"
dark_theme = "github-dark"

[extra]
toc = true
toc_inline = true
toc_sidebar = true
use_cdn = false
favicon = "/icon/favicon.png"
favicon_extra = false
theme = "toggle"              # light, dark, auto, toggle
comment = false
fancy_code = true
dynamic_note = true
repo_url = "https://github.com/SeniorMars/seniormars.com/blob/main/content/"
mathjax = true
mathjax_extra = true
mathjax_asciimath = false
mathjax_dollar_inline_enable = true
mathjax_accessibility = false
mathjax_load = "idle"
mermaid = true
mermaid_load = "visible"
mobile = true
browser_theme_color = ["#FFFFFF", "#0E1018"]

menu = [
    { name = "/posts", url = "/posts", weight = 1 },
    { name = "/projects", url = "/projects", weight = 2 },
    { name = "/about", url = "/about", weight = 3 },
    { name = "/tags", url = "/tags", weight = 4 },
]

# keep for now
socials = [
    { name = "github", url = "https://github.com/seniormars/", icon = "github" },
    { name = "youtube", url = "https://www.youtube.com/seniormarstries", icon = "youtube" },
    { name = "rss", url = "/rss.xml", icon = "rss" },
]

cards_columns = 3
card_media_height = 200

[extra.taxonomies]
sort_by = "page_count"         # e.g. name, page_count
reverse = true

custom_css = []

[extra.analytics]
enabled = false

[extra.analytics.goatcounter]
user = "your_user"
host = "example.com" # default= goatcounter.com

[extra.analytics.umami]
website_id = "43929cd1-1e83...."
host_url = "https://stats.mywebsite.com" # default: https://analytics.eu.umami.is
